<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shyndrome_残席情報画像</title>
    <style>
        #container {
            position: relative;
            display: inline-block;
            width: 90vw;
        }
        #baseImage, #previewImage {
            width: 100%;
            height: auto;
        }
        .marker {
            position: absolute;
            font-size: 60px;
            font-weight: bold;
            color: #c73d4d;
        }
        #previewImage {
            display: block;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <label for="input1">6/19(金) 19:00回</label>
    <input type="number" id="input1" placeholder="6/19(金) 19:00回">
    <br>
    <label for="input2">6/20(土) 14:00回</label>
    <input type="number" id="input2" placeholder="6/20(土) 14:00回">
    <br>
    <label for="input3">6/20(土) 18:00回</label>
    <input type="number" id="input3" placeholder="6/20(土) 18:00回">
    <br>
    <label for="input4">6/21(日) 13:00回</label>
    <input type="number" id="input4" placeholder="6/21(日) 13:00回">
    <br>
    <label for="input5">6/21(日) 17:00回</label>
    <input type="number" id="input5" placeholder="6/21(日) 17:00回">
    <br>
    <button onclick="processImage()">確定</button>
    <button onclick="saveImage()">保存</button>
    
    <br><br>
    <div id="container">
        <img id="baseImage" src="残席情報フォーマット_逆説夫婦善哉.jpg" alt="背景画像">
        <img id="previewImage" alt="プレビュー画像" style="display:none; cursor: pointer;" >
    </div>

    <script>
    const inputValue01 = document.getElementById('input1');
    const inputValue02 = document.getElementById('input2');
    const inputValue03 = document.getElementById('input3');
    const inputValue04 = document.getElementById('input4');
    const inputValue05 = document.getElementById('input5');
    const sheetUrl = 'https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnQQnTOV9iCqDv2y_VNwVO3CY3-zhVpSEHnfzj-xrcruvl8HejW7VU9JFEy9mQQ3etKzaT43IoXPHCAFjDpqBAuNl-C2MXhtZ7zHmj2RIt_QCijC0-Pp0qrycP6rzR6OJNpXkwKsX0pGEwZCikYsxErEbHKCISnuoXBbX1uVbp2J5OW2XldwqBKCvD1jJB_jyAcAYkLuIBHqPF9AkQjr_SQWZetgoGDIlzTa9Ls2scngrhDS7QpMl_XYhlGQ1Nuyy1Q_P3Bmoc-IDa-sdyDfgQapAudfeQ&lib=MEePv-QPXKsiky45Btae-Zc7qlj9jboXg';

    fetch(sheetUrl)
        .then(function (data) {
            return data.json();
        })
        .then(function (json) {
            var v1 = json.s1;
            var v2 = json.s2;
            var v3 = json.s3;
            var v4 = json.s4;
            var v5 = json.s5;

            inputValue01.value = v1;
            inputValue02.value = v2;
            inputValue03.value = v3;
            inputValue04.value = v4;
            inputValue05.value = v5;
        })

    function processImage() {
        const positions = [
          { left: 1150, top: 2600 },
          { left: 2250, top: 2600 },
          { left: 2250, top: 3425 },
          { left: 3350, top: 2600 },
          { left: 3350, top: 3425 }
        ];
    
        const values = [
            document.getElementById('input1').value,
            document.getElementById('input2').value,
            document.getElementById('input3').value,
            document.getElementById('input4').value,
            document.getElementById('input5').value
        ];
    
        function getAssetImage(value) {
            if (value <= 0) return "アセット/アセット 5.png";
            if (value <= 10) return "アセット/アセット 4.png";
            if (value <= 20) return "アセット/アセット 3.png";
            if (value <= 30) return "アセット/アセット 2.png";
            if (30 < value) return "アセット/アセット 1.png";
            return null;
        }
    
        positions.forEach((pos, i) => {
            const val = parseInt(values[i]);
            if (!isNaN(val)) {
                const image = getAssetImage(val);
                if (image) {
                    pos.image = image;
                }
            }
        });
    
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const baseImage = document.getElementById('baseImage');
    
        canvas.width = baseImage.naturalWidth;
        canvas.height = baseImage.naturalHeight;
        ctx.drawImage(baseImage, 0, 0);
    
        let imagesLoaded = 0;
        let totalImages = positions.filter(p => p.image).length;
    
        function drawPreview() {
            const previewImage = document.getElementById('previewImage');
            previewImage.src = canvas.toDataURL("image/png");
            previewImage.style.display = "block";
            baseImage.style.display = "none";
        }
    
        if (totalImages === 0) {
            drawPreview();
            return;
        }
    
        const iconSize = 320;
    
        positions.forEach((pos) => {
            if (pos.image) {
                const img = new Image();
                img.src = pos.image;
                img.onload = function () {
                    ctx.drawImage(
                        img,
                        pos.left - iconSize / 2,
                        pos.top - iconSize / 2,
                        iconSize,
                        iconSize
                    );
                    imagesLoaded++;
                    if (imagesLoaded === totalImages) {
                        drawPreview();
                    }
                };
                img.onerror = function () {
                    console.error("画像の読み込みに失敗しました:", pos.image);
                    imagesLoaded++;
                    if (imagesLoaded === totalImages) {
                        drawPreview();
                    }
                };
            }
        });
    }

    function saveImage() {
        const previewImage = document.getElementById('previewImage');

        var now = new Date();
        const dateString = now.getFullYear() +
            ('0' + (now.getMonth() + 1)).slice(-2) +
            ('0' + now.getDate()).slice(-2);

        const link = document.createElement('a');
        link.href = previewImage.src;
        link.download = 'aogane_残席情報_' + dateString + '.png';
        link.click();
    }
</script>
    
</body>
</html>
